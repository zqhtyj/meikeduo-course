<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美客多巴西本土店·课程培训页（改进版）</title>
<style>
/* 修复Google Fonts CDN链接问题 - 使用系统字体作为fallback */
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
/* 注意：Google Fonts在中国可能被屏蔽，建议使用本地字体或镜像 */
/* 备选方案：使用系统字体 */
/* font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; */

:root {
  --bg:#f5f0e8;--bg2:#ebe4d8;--bg3:#fff9f0;--card:#fffcf5;
  --text:#2a1f14;--text2:#5a4a38;--text3:#8a7a68;
  --accent1:#c04b2d;--accent2:#d4842a;--accent3:#2a7d5f;--accent4:#2a5f7d;--accent5:#7d2a5f;
  --border:#d4c8b8;--shadow:rgba(42,31,20,0.08);--shadow2:rgba(42,31,20,0.15);
  --tag-bg:rgba(192,75,45,0.08);--tag-border:rgba(192,75,45,0.2);
  --warn-bg:rgba(212,132,42,0.08);--warn-border:rgba(212,132,42,0.25);
  --ext-bg:rgba(42,125,95,0.06);--ext-border:rgba(42,125,95,0.2);
  --radius:10px;--radius-sm:6px;--transition:0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"]{
  --bg:#1a1612;--bg2:#241e18;--bg3:#2a2420;--card:#2e2820;
  --text:#e8dfd4;--text2:#b8a898;--text3:#887868;
  --border:#3e3428;--shadow:rgba(0,0,0,0.2);--shadow2:rgba(0,0,0,0.35);
  --tag-bg:rgba(192,75,45,0.15);--tag-border:rgba(192,75,45,0.35);
  --warn-bg:rgba(212,132,42,0.12);--warn-border:rgba(212,132,42,0.3);
  --ext-bg:rgba(42,125,95,0.1);--ext-border:rgba(42,125,95,0.25);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh;transition:background var(--transition),color var(--transition)}
.hero{background:linear-gradient(135deg,var(--accent1) 0%,var(--accent2) 50%,var(--accent3) 100%);padding:48px 24px 56px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hero h1{font-family:'Noto Serif SC',serif;font-size:clamp(1.6rem,4vw,2.6rem);color:#fff;font-weight:900;letter-spacing:0.04em;position:relative;text-shadow:0 2px 12px rgba(0,0,0,0.2)}
.hero .sub{color:rgba(255,255,255,0.85);font-size:0.95rem;margin-top:10px;position:relative;font-weight:300}
.toolbar{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(12px);transition:background var(--transition)}
.search-box{flex:1;min-width:180px;padding:8px 14px;border:1px solid var(--border);border-radius:20px;background:var(--card);color:var(--text);font-size:0.9rem;outline:none;transition:border var(--transition),box-shadow var(--transition);font-family:inherit}
.search-box:focus{border-color:var(--accent1);box-shadow:0 0 0 3px var(--tag-bg)}
.search-box::placeholder{color:var(--text3)}
.tb-btn{padding:7px 16px;border:1px solid var(--border);border-radius:20px;background:var(--card);color:var(--text2);cursor:pointer;font-size:0.82rem;font-family:inherit;transition:all var(--transition);white-space:nowrap}
.tb-btn:hover{border-color:var(--accent1);color:var(--accent1)}
.main{max-width:960px;margin:0 auto;padding:32px 16px 80px}
.section{margin-bottom:28px;border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 12px var(--shadow);transition:box-shadow var(--transition)}
.section:hover{box-shadow:0 4px 20px var(--shadow2)}
.section-head{padding:18px 22px;cursor:pointer;display:flex;align-items:center;gap:14px;user-select:none;transition:background var(--transition)}
.section-head .ico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:#fff;flex-shrink:0;font-weight:700}
.section-head .info{flex:1}
.section-head .info h2{font-family:'Noto Serif SC',serif;font-size:1.15rem;font-weight:700;line-height:1.4}
.section-head .info .desc{font-size:0.82rem;color:var(--text3);margin-top:2px}
.section-head .arrow{font-size:1.1rem;color:var(--text3);transition:transform var(--transition);flex-shrink:0}
.section.open .section-head .arrow{transform:rotate(90deg)}
.section-body{max-height:0;overflow:hidden;transition:max-height 0.5s cubic-bezier(0.4,0,0.2,1)}
.section.open .section-body{max-height:50000px}
.section-body-inner{padding:0 22px 22px}
.topic{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;transition:border-color var(--transition),box-shadow var(--transition)}
.topic:hover{border-color:var(--accent2)}
.topic:last-child{margin-bottom:0}
.topic-head{padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;user-select:none}
.topic-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#fff;flex-shrink:0}
.topic-head .title{flex:1;font-weight:600;font-size:0.95rem}
.topic-head .brief{font-size:0.78rem;color:var(--text3);max-width:40%;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topic-head .tarrow{color:var(--text3);transition:transform var(--transition);flex-shrink:0;font-size:0.85rem}
.topic.open .topic-head .tarrow{transform:rotate(90deg)}
.topic-body{max-height:0;overflow:hidden;transition:max-height 0.45s cubic-bezier(0.4,0,0.2,1)}
.topic.open .topic-body{max-height:30000px}
.topic-body-inner{padding:0 18px 16px}
.kb{margin-bottom:14px;border-radius:var(--radius-sm);padding:14px 16px;font-size:0.88rem;line-height:1.8}
.kb:last-child{margin-bottom:0}
.kb-label{font-weight:700;font-size:0.78rem;letter-spacing:0.06em;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.kb-core{background:var(--tag-bg);border-left:3px solid var(--accent1)}
.kb-core .kb-label{color:var(--accent1)}
.kb-warn{background:var(--warn-bg);border-left:3px solid var(--accent2)}
.kb-warn .kb-label{color:var(--accent2)}
.kb-ext{background:var(--ext-bg);border-left:3px solid var(--accent3)}
.kb-ext .kb-label{color:var(--accent3)}
.kb ul{padding-left:1.2em}
.kb li{margin-bottom:2px}
.kb strong{font-weight:600}
.kb .hl{color:var(--accent1);font-weight:600}
.kb .hl2{color:var(--accent3);font-weight:600}
.takeaways{background:linear-gradient(135deg,var(--accent1),var(--accent2));border-radius:var(--radius);padding:28px 24px;margin-bottom:28px;color:#fff}
.takeaways h2{font-family:'Noto Serif SC',serif;font-size:1.2rem;margin-bottom:16px;text-align:center}
.takeaways ol{padding-left:1.4em;font-size:0.92rem;line-height:2}
.takeaways li{opacity:0.95}
.homework{background:var(--card);border:2px dashed var(--accent3);border-radius:var(--radius);padding:24px;margin-bottom:28px}
.homework h2{font-family:'Noto Serif SC',serif;font-size:1.1rem;color:var(--accent3);margin-bottom:14px}
.hw-item{background:var(--ext-bg);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;font-size:0.88rem}
.hw-item:last-child{margin-bottom:0}
.hw-item strong{color:var(--accent3)}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px}
.stat-card{flex:1;min-width:140px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-card .num{font-family:'Noto Serif SC',serif;font-size:1.8rem;font-weight:900;line-height:1.2}
.stat-card .label{font-size:0.78rem;color:var(--text3);margin-top:4px}
.sec-platform .section-head{background:linear-gradient(135deg,rgba(192,75,45,0.08),rgba(192,75,45,0.03))}
.sec-platform .section-head .ico{background:var(--accent1)}
.sec-platform .topic-num{background:var(--accent1)}
.sec-tax .section-head{background:linear-gradient(135deg,rgba(42,95,125,0.08),rgba(42,95,125,0.03))}
.sec-tax .section-head .ico{background:var(--accent4)}
.sec-tax .topic-num{background:var(--accent4)}
.sec-product .section-head{background:linear-gradient(135deg,rgba(42,125,95,0.08),rgba(42,125,95,0.03))}
.sec-product .section-head .ico{background:var(--accent3)}
.sec-product .topic-num{background:var(--accent3)}
.sec-extra .section-head{background:linear-gradient(135deg,rgba(125,42,95,0.08),rgba(125,42,95,0.03))}
.sec-extra .section-head .ico{background:var(--accent5)}
.sec-extra .topic-num{background:var(--accent5)}

/* 修复打印样式问题 - 同时展开section和topic */
@media print{
  .toolbar{display:none}
  .section-body,.topic-body{max-height:none!important}
  .section,.topic{break-inside:avoid}
}

/* 响应式设计 */
@media(max-width:640px){
  .hero{padding:32px 16px 40px}
  .topic-head .brief{display:none}
  .stats{gap:8px}
  .stat-card{min-width:100px;padding:12px}
  .stat-card .num{font-size:1.4rem}
}

/* 搜索高亮样式 */
.search-highlight{background-color:rgba(192,75,45,0.3);border-radius:2px;padding:0 2px}

/* 键盘快捷键提示 */
.shortcut-hint{font-size:0.7rem;color:var(--text3);margin-left:4px;opacity:0.7}
</style>
</head>
<body>
<div class="hero">
  <h1 id="heroTitle"></h1>
  <div class="sub" id="heroSub"></div>
</div>
<div class="toolbar">
  <input class="search-box" type="text" placeholder="搜索关键词... (Ctrl+F)" id="searchInput">
  <button class="tb-btn" id="expandAll">全部展开</button>
  <button class="tb-btn" id="collapseAll">全部收起</button>
  <button class="tb-btn" id="themeToggle">深色模式</button>
</div>
<div class="main" id="mainContent">
  <div class="stats" id="statsContainer"></div>
  <div id="sectionsContainer"></div>
  <div id="takeawaysContainer"></div>
  <div id="homeworkContainer"></div>
</div>

<script>
// 修复classList拼写错误问题（原版有bug）
function toggleSection(el) { 
  const section = el.closest('.section');
  if (section) {
    section.classList.toggle('open');
  }
}

function toggleTopic(el) { 
  const topic = el.closest('.topic');
  if (topic) {
    topic.classList.toggle('open');
  }
}

// 修复搜索功能问题 - 搜索时先展开所有折叠块
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  
  // 如果搜索词不为空，先展开所有折叠块
  if (q) {
    document.querySelectorAll('.section').forEach(s => s.classList.add('open'));
    document.querySelectorAll('.topic').forEach(t => t.classList.add('open'));
  }
  
  document.querySelectorAll('.section').forEach(sec => {
    let secMatch = false;
    sec.querySelectorAll('.topic').forEach(top => {
      const match = !q || top.textContent.toLowerCase().includes(q);
      top.style.display = match ? '' : 'none';
      if (match) { secMatch = true; }
    });
    sec.style.display = secMatch ? '' : 'none';
  });
  
  // 添加搜索高亮
  if (q) {
    document.querySelectorAll('.topic').forEach(top => {
      if (top.style.display !== 'none') {
        highlightText(top, q);
      }
    });
  } else {
    // 清除高亮
    document.querySelectorAll('.search-highlight').forEach(el => {
      el.outerHTML = el.textContent;
    });
  }
});

// 搜索高亮函数
function highlightText(element, keyword) {
  // 清除之前的高亮
  element.querySelectorAll('.search-highlight').forEach(el => {
    el.outerHTML = el.textContent;
  });
  
  // 添加新高亮
  const regex = new RegExp(`(${keyword})`, 'gi');
  const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT);
  const textNodes = [];
  let node;
  while (node = walker.nextNode()) {
    textNodes.push(node);
  }
  
  textNodes.forEach(textNode => {
    if (textNode.nodeValue.toLowerCase().includes(keyword.toLowerCase())) {
      const span = document.createElement('span');
      span.className = 'search-highlight';
      span.textContent = textNode.nodeValue;
      textNodes.parentNode.replaceChild(span, textNode);
    }
  });
}

// 增加键盘快捷键
document.addEventListener('keydown', function(e) {
  // Ctrl+F 聚焦搜索框
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  
  // Esc 收起所有
  if (e.key === 'Escape') {
    document.getElementById('collapseAll').click();
    document.getElementById('searchInput').blur();
  }
});

// 主题切换
let dark = false;
document.getElementById('themeToggle').onclick = function() {
  dark = !dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
  this.textContent = dark ? '浅色模式' : '深色模式';
  
  // 保存主题偏好到localStorage
  localStorage.setItem('theme', dark ? 'dark' : 'light');
};

// 页面加载时恢复主题偏好
window.addEventListener('DOMContentLoaded', function() {
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'dark') {
    dark = true;
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('themeToggle').textContent = '浅色模式';
  }
});

// 全部展开
document.getElementById('expandAll').onclick = () => {
  document.querySelectorAll('.section').forEach(s => s.classList.add('open'));
  document.querySelectorAll('.topic').forEach(t => t.classList.add('open'));
};

// 全部收起
document.getElementById('collapseAll').onclick = () => {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('open'));
  document.querySelectorAll('.topic').forEach(t => t.classList.remove('open'));
};

// 渲染函数
function render(data) {
  document.title = data.title;
  document.getElementById('heroTitle').textContent = data.title;
  document.getElementById('heroSub').textContent = data.subtitle || '';
  
  // Stats
  const sc = document.getElementById('statsContainer');
  if (data.stats && data.stats.length) {
    sc.innerHTML = data.stats.map(s =>
      `<div class="stat-card"><div class="num" style="color:${ACCENT_COLORS[(s.color||1)-1]}">${s.num}</div><div class="label">${s.label}</div></div>`
    ).join('');
  }
  
  // Sections
  const c = document.getElementById('sectionsContainer');
  c.innerHTML = data.sections.map(sec => {
    const topics = sec.topics.map((t, ti) => {
      let kb = '';
      if (t.core) kb += `<div class="kb kb-core"><div class="kb-label">◆ 核心提炼</div>${t.core}</div>`;
      if (t.warn) kb += `<div class="kb kb-warn"><div class="kb-label">⚠ 易错警示</div>${t.warn}</div>`;
      if (t.ext)  kb += `<div class="kb kb-ext"><div class="kb-label">► 举一反三</div>${t.ext}</div>`;
      if (t.orig) kb += `<div class="kb" style="background:var(--bg2);border-left:3px solid var(--border)"><div class="kb-label" style="color:var(--text3)">✧ 原文摘要</div>${t.orig}</div>`;
      return `<div class="topic"><div class="topic-head" onclick="toggleTopic(this)"><div class="topic-num">${ti+1}</div><div class="title">${t.title}</div><div class="brief">${t.brief||''}</div><div class="tarrow">▶</div></div><div class="topic-body"><div class="topic-body-inner">${kb}</div></div></div>`;
    }).join('');
    return `<div class="section sec-${sec.cls||'platform'} open"><div class="section-head" onclick="toggleSection(this)"><div class="ico">${sec.icon||'★'}</div><div class="info"><h2>${sec.title}</h2><div class="desc">${sec.desc||''}</div></div><div class="arrow">▶</div></div><div class="section-body"><div class="section-body-inner">${topics}</div></div></div>`;
  }).join('');
  
  // Takeaways
  const tk = document.getElementById('takeawaysContainer');
  if (data.takeaways && data.takeaways.length) {
    tk.innerHTML = `<div class="takeaways"><h2>核心要点回顾</h2><ol>${data.takeaways.map(t => `<li>${t}</li>`).join('')}</ol></div>`;
  }
  
  // Homework
  const hw = document.getElementById('homeworkContainer');
  if (data.homework && data.homework.length) {
    hw.innerHTML = `<div class="homework"><h2>实践作业</h2>${data.homework.map(h => `<div class="hw-item"><strong>${h.title}</strong><br>${h.content}</div>`).join('')}</div>`;
  }
}

// 颜色数组
const ACCENT_COLORS = ['var(--accent1)','var(--accent2)','var(--accent3)','var(--accent4)','var(--accent5)'];

// ===== DATA INJECTION POINT =====
const DATA = {
  "title": "美客多巴西本土店·推广获客篇（第5-7章）",
  "subtitle": "",
  "sections": [
    {
      "cls": "platform",
      "icon": "★",
      "title": "第5章：物流方案——FULL仓与自发货",
      "desc": "物流是巴西电商的核心痛点。巴西国土面积排名世界第五，基础设施分布不均，尾程配送成本高昂，关税体系极其复杂。本章将聚焦美客多巴西站三大物流模式——FULL仓、Flex和自发货，从成本结构、时效标准到库存",
      "topics": []
    },
    {
      "cls": "tax",
      "icon": "◆",
      "title": "5.1 物流模式对比",
      "desc": "美客多巴西站为卖家提供三种物流模式，各自对应不同的时效、成本和流量权重。选择哪种模式，决定了你的起跑线在哪个位置。",
      "topics": [
        {
          "title": "5.1.1 FULL仓（官方仓）",
          "brief": "",
          "core": "<p>FULL仓是美客多自营仓储配送体系，卖家将货物提前发至美客多巴西境内的官方仓库，平台负责存储、拣货、打包和末端配送。<br />\n| 维度 | 具体说明 |<br />\n|------|---------|<br />\n| 配送时效 | 2~5个工作日（覆盖巴西大部分地区） |<br />\n| 配送范围 | 巴西全国，含偏远地区 |<br />\n| 流量权重 | 最高——FULL标签+绿色边框+搜索加权 |<br />\n| 转化率提升 | 15%~25%（对比非FULL商品） |<br />\n| 计费方式 | 按仓储体积+配送距离+重量综合计费 |</p><p>并非仅仅在于时效。FULL商品在搜索结果中会被平台自动添加绿色边框和\"FULL\"标签，这个标签本身就是转化率催化剂。某3C卖家同步测试同一款产品，FULL仓版本比自发货版本在30天内累计多出73%的订单，转化率差异达到21.6%。<br />\n<strong>核心劣势</strong>在于库存风险。货物进入FULL仓后，如果滞销，仓储费会持续消耗利润。且FULL仓退货处理周期长，退货商品重新上架审核严格。</p>",
          "warn": "",
          "ext": "",
          "orig": ""
        },
        {
          "title": "5.1.2 Flex（小件快送）",
          "brief": "",
          "core": "<p>Flex模式适用于重量较轻的商品（通常2kg以下），由卖家自行发货但使用美客多合作的物流商（如Correios、JadLog等），物流信息同步至平台系统。<br />\n| 维度 | 具体说明 |<br />\n|------|---------|<br />\n| 配送时效 | 3~5个工作日 |<br />\n| 适用重量 | 通常2kg以内 |<br />\n| 计费方式 | 按重量计费，阶梯价格 |<br />\n| 流量权重 | 中等——无FULL标签但有\"Envio Flex\"标识 |<br />\n| 转化率 | 略低于FULL，高于自发货 |<br />\nFlex是FULL仓的补充方案。当FULL仓仓容不足、或商品因尺寸/品类限制无法入仓时，Flex可作为替代选择。它的成本弹性较高——重量越轻、配送距离越近，运费越低。</p>",

        {
          "title": "5.1.3 自发货",
          "brief": "",
          "core": "<p>自发货指卖家自行联系物流商（如第三方货代、邮政小包等）完成配送，平台仅提供面单或仅标记物流单号。<br />\n| 维度 | 具体说明 |<br />\n|------|---------|<br />\n| 配送时效 | 7~15个工作日（跨境发货更长） |<br />\n| 计费方式 | 自行协商，差异大 |<br />\n| 流量权重 | 最低——无任何平台标识或加权 |<br />\n| 转化率影响 | 明显低于FULL和Flex |<br />\n| 适用场景 | 测试新品、大件异形件、FULL仓拒收商品 |<br />\n自发货的优势在于灵活度——不受入仓规则限制、不产生仓储费、退货处理由卖家自主。但代价是搜索权重损失明显，且消费者看到配送时效7天以上时，跳失率显著增加。</p>",

      "topics": [
        {
          "title": "5.2.1 运费体系重构：从固定费率到动态定价",
          "brief": "",
          "core": "<p>2026年之前，美客多巴西站对大多数品类采用相对固定的运费标准，卖家可以较为准确地预估物流成本。新的运费体系取消了固定运费，取而代之的是<strong>29个重量区间 × 8个价格区间 = 232种运费组合</strong>。<br />\n| 变革维度 | 旧体系 | 新体系 |<br />\n|---------|-------|-------|<br />\n| 定价方式 | 固定运费 | 动态组合定价 |<br />\n| 组合数量 | 约10~20种 | 232种 |<br />\n| 运费范围 | 相对稳定 | 最高涨幅达400% |<br />\n| 覆盖范围 | 部分商品 | 售价&gt;19雷亚尔商品全部纳入 |<br />\n<strong>适用范围</strong>：商品售价大于19雷亚尔的，全部纳入新运费计算体系。这意味着绝大多数在售商品都会受到新体系影响。</p>",

        {
          "title": "5.2.2 运费暴涨的品类分布",
          "brief": "",
          "core": "<p>受新体系冲击最大的品类集中在以下三类：<br />\n- <strong>大件轻质商品（泡货）</strong>：如抱枕、毛绒玩具、空箱包、塑料收纳盒<br />\n- <strong>体积规整但偏重商品</strong>：如小家电、工具套装<br />\n- <strong>低客单价标品</strong>：售价在19~39雷亚尔之间，运费占比过高的商品</p><p>一款售价39雷亚尔的塑料收纳盒，旧体系下运费约12雷亚尔（运费占比30.8%），新体系下运费暴增至48雷亚尔（运费占比123%）。这意味着卖出这件商品，仅运费一项就要倒贴9雷亚尔。</p>",

          "ext": "",
          "orig": ""

        {
          "title": "5.2.3 体积重严格化：泡货成本陷阱",
          "brief": "",
          "core": "<p>新体系最关键的规则变化是<strong>体积重计算方式被严格执行</strong>。<br />\n实重与体积重取大值计费，体积重计算公式为：</p>\n<pre class=\"codehilite\"><code>体积重(kg) = 长(cm) × 宽(cm) × 高(cm) ÷ 6000\n</code></pre>",
          "warn": "",
          "ext": "<p>一款包装尺寸为40cm × 30cm × 20cm、实际重量仅0.5kg的手机壳：</p>\n<pre class=\"codehilite\"><code>体积重 = 40 × 30 × 20 ÷ 6000 = 4.0kg\n计费重量 = max(0.5kg, 4.0kg) = 4.0kg\n</code></pre>\n\n<p>实际重量0.5kg的商品，按4.0kg计费，物流成本飙升8倍。这就是\"泡货\"——体积大但重量轻的商品，在新运费体系下成本结构被彻底打破。<br />\n<strong>避坑方案</strong>：<br />\n| 策略 | 具体做法 | 效果 |<br />\n|------|---------|------|<br />\n| 压缩包装 | 使用真空袋、定制小尺寸包装盒 | 可减少体积重30%~50% |<br />\n| 减少内托 | 在保护完好的前提下取消多余填充物 | 可减少体积重10%~20% |<br />\n| 改用软包装 | 信封袋替代硬纸盒，降低包装厚度 | 适用于纺织品、服装类 |<br />\n| 产品设计优化 | 可拆卸设计，分体包装运输 | 大件品类战略性调整 |<br />\n<strong>重点关注指标</strong>：上架前务必计算\"密度比 = 实重(kg) ÷ 体积重(kg)\"。密度比低于0.3的商品属于高危泡货，建议重新评估包装方案或考虑更换产品。</p>\n<hr />",
          "orig": ""
        }
      ]

          "brief": "",
          "core": "<p>对于首次使用FULL仓的卖家，推荐采用<strong>小批量多种类</strong>的试水策略：<br />\n| 步骤 | 操作内容 | 目的 |<br />\n|------|---------|------|<br />\n| 第1步 | 选择5~10个SKU，每SKU备货20~50件 | 控制首次入库规模 |<br />\n| 第2步 | 优先选择体积适中、重量轻、历史转化率高的商品 | 降低滞销风险 |<br />\n| 第3步 | 使用定制尺寸的纸箱，预留5%的余量应对测量误差 | 降低尺寸拒收率 |<br />\n| 第4步 | 记录每箱的长宽高和重量，与入库单逐一核对 | 确保信息100%一致 |<br />\n| 第5步 | 入库后第1周每天监控库存消耗速度 | 确认动销是否符合预期 |<br />\n<strong>试水周期建议</strong>：首次入库后观察30天，收集FULL仓的周转数据，再根据实际动销情况制定第2批备货计划。</p>",

        {

      "title": "5.4 备货公式与库存策略",
      "desc": "库存管理是FULL仓运营的核心竞争力。备多了——仓储费吞噬利润；备少了——断货失去权重累积。两者之间的平衡点，由一套精密的计算模型决定。",
      "topics": [
        {
          "title": "5.4.1 安全库存公式",
          "brief": "",
          "core": "<pre class=\"codehilite\"><code>安全库存 = Z × σ × √LT\n</code></pre>\n\n<p>其中：<br />\n- <strong>Z</strong>：服务水平系数（95%服务水平取1.65，97.5%取1.96，99%取2.33）<br />\n- <strong>σ</strong>：日销量标准差（取过去30天数据的标准差）<br />\n- <strong>LT</strong>：补货周期（补货发出到上架销售的总天数）<br />\n<strong>简化计算（适用于中小卖家）</strong>：</p>\n<pre class=\"codehilite\"><code>安全库存 = 日均销量 × 补货周期天数 × 0.5\n</code></pre>\n\n<p><strong>示例</strong>：某商品日均销量20件，补货周期30天，取50%缓冲：</p>\n<pre class=\"codehilite\"><code>安全库存 = 20 × 30 × 0.5 = 300件\n</code></pre>",

          "ext": "",
          "orig": ""

        {
          "title": "5.4.2 补货周期的完整构成",
          "brief": "",
          "core": "<p>补货不是\"下单后3天到货\"那么简单。供应链各个环节的时间累加构成了真实的补货周期：<br />\n| 环节 | 耗时 | 说明 |<br />\n|------|------|------|<br />\n| 国内采购/生产 | 7~15天 | 工厂排期+原材料采购+生产+质检 |<br />\n| 国内集货 | 1~3天 | 集中多个SKU，拼货装柜 |<br />\n| 国际海运 | 35~50天 | 中国→巴西桑托斯港，含清关和等待时间 |<br />\n| 巴西本地运输 | 3~7天 | 桑托斯港→FULL仓/备货仓 |<br />\n| 入库预约等待 | 3~7天 | FULL仓预约排队 |<br />\n| 入库上架 | 2~5天 | 验收→上架→可售状态 |<br />\n| <strong>总补货周期</strong> | <strong>51~87天</strong> | 建议取中位数68天 |</p><p>从国内下单补货到在巴西FULL仓可售，中间至少需要2个月。这意味着你预测的不是未来2周的销量，而是未来2~3个月的销量。误差的积累效应极大。</p>",

          "core": "<pre class=\"codehilite\"><code>再订货点(ROP) = 日均销量 × 补货周期天数 + 安全库存\n最大库存水平 = 再订货点 + 单批补货量\n</code></pre>",

        {
          "title": "5.4.4 周转天数30天生死线",
          "brief": "",
          "core": "<p><strong>库存周转天数</strong>是衡量FULL仓健康度的核心指标：</p>\n<pre class=\"codehilite\"><code>周转天数 = 当前库存量 ÷ 日均销量\n</code></pre>\n\n<p>美客多FULL仓的运营经验表明，周转天数控制在30天以内是最优区间。超过这个阈值，风险开始显著增加：<br />\n| 周转天数 | 库存健康度 | 风险状态 | 建议行动 |<br />\n|---------|----------|---------|---------|<br />\n| &lt;15天 | 优秀 | 可能面临断货风险 | 适当增加安全库存 |<br />\n| 15~30天 | 健康 | 低风险 | 维持当前节奏 |<br />\n| 30~45天 | 预警 | 中度风险 | 启动促销加速消耗 |<br />\n| 45~60天 | 高危 | 高风险 | 立即降价清仓 |<br />\n| &gt;60天 | 危险 | 极高风险 | 滞销清仓处理 |<br />\n<strong>数据支撑</strong>：对300个FULL仓SKU的追踪数据显示，周转天数超过45天的SKU，最终产生长期仓储费（仓储费占售价比超过15%）的概率是周转天数30天以内SKU的4.7倍。</p>\n<hr />",

      "title": "5.5 滞销品清仓四步策略",
      "desc": "滞销是FULL仓运营中最棘手的问题。处理得当，可以从泥潭中回收大部分资金；处理不当，仓储费持续燃烧，最终血本无归。",
      "topics": [
        {
          "title": "5.5.1 滞销的定义与发现时机",
          "brief": "",
          "core": "<p>在美客多FULL仓场景下，建议将以下标准定义为\"滞销\"：<br />\n- 商品入库超过45天，库存消耗不足30%<br />\n- 日均销量低于补货前预测值的20%<br />\n- 周转天数超过60天<br />\n<strong>发现滞销的时机越早越好</strong>。前文已述，仓储费在第61天开始成倍增长。因此，在第30天的库存盘点中就应该识别出潜在滞销品，而不是等到仓储费暴增后再处理。</p>",
          "warn": "",
          "ext": "",
          "orig": ""
        },
        {
          "title": "5.5.2 四步清仓策略",
          "brief": "",
          "core": "<h4>第1步：阶梯降价（第30~45天）</h4>\n<p>不要一次性降价到底。分阶段降价的经济效益显著优于一次性降价：<br />\n| 降价阶段 | 降价幅度 | 持续时间 | 目标 |<br />\n|---------|---------|---------|------|<br />\n| 第1次降价 | 降价10%~15% | 5~7天 | 测试价格弹性，清理边缘库存 |<br />\n| 第2次降价 | 再降10%~15%（累计20%~30%） | 5~7天 | 加速消耗 |<br />\n| 第3次降价 | 再降10%~15%（累计30%~45%） | 5~7天 | 清空剩余库存 |<br />\n| 底线价 | 成本价或略亏 | 不限 | 保底清空 |<br />\n<strong>分阶段降价为什么更优</strong>？三个原因：一是每次降价都能带来一轮新的流量脉冲，持续吸引新的买家群体；二是给一部分\"价格敏感但愿意等待\"的消费者时间窗口下单；三是一步到位降到最低价，会向市场传递\"这个商品有问题\"的信号，反而抑制转化率。<br />\n实测数据显示，分阶段降价比一次性降价到最低价，平均多回收23%的资金。</p>\n<h4>第2步：捆绑销售（第45~60天）</h4>\n<p>当阶梯降价效果不理想时，转入捆绑销售策略：<br />\n| 捆绑方式 | 操作 | 适用场景 |<br />\n|---------|------|---------|<br />\n| 高低搭配 | 滞销品+热销品打包，总价略低于热销品单独售价 | 滞销品有互补属性 |<br />\n| 买一赠一 | 购买热销品赠送滞销品 | 滞销品本身作为赠品有吸引力 |<br />\n| 套装组合 | 多个滞销品组成套装，定一个清仓总价 | 多个滞销品同品类 |<br />\n| 跨品捆绑 | 滞销品+畅销低配件，设置组合折扣 | 滞销品与热销品无直接关联 |</p><p>活动清仓阶段的单次活动出单率如果低于5%，说明价格仍然不够低，或者商品本身在FULL仓体系内已经没有竞争力。此时应果断转入第4步。</p>\n<h4>第4步：本地批发（第75天以后）</h4>\n<p>当线上渠道已经无法有效消化库存时，启动线下批发渠道：<br />\n| 批发渠道 | 对接方式 | 回收率 |<br />\n|---------|---------|--------|<br />\n| 巴西本地地推团队 | 通过社交渠道（WhatsApp、Instagram）联系本地小B买家 | 回收获利10%~30% |<br />\n| 批发平台 | 使用Brás、25 de Março等批发市场介绍人 | 回收成本价~10%利润 |<br />\n| 统货商 | 整批出售给清货公司，价格按品相和品类打包 | 回收成本价的30%~50% |<br />\n| 本地跳蚤市场/路边摊 | 极短链路的终极方案 | 回收成本价以下 |</p>",
          "warn": "<p>第4步的回收率远低于前3步，但这是避免持续支付仓储费的止损方案。如果发现商品在第1~3步中完全没有动销迹象，不要犹豫，直接跳到第4步。每多存一个月，仓储费就吃掉一部分回收价值。</p>",
          "ext": "<p>捆绑销售不是为了捆绑而捆绑——核心逻辑是把滞销品从\"独立商品\"转变为\"让价容器\"。买家感知到的是\"套装划算\"，而不是\"卖家在甩卖低价品\"。</p>\n<h4>第3步：活动清仓（第60~75天）</h4>\n<p>利用美客多的站内促销工具进行最后一轮规模清仓：<br />\n| 工具 | 操作方式 | 清仓效果 |<br />\n|------|---------|---------|<br />\n| 平台大促报名 | 申请参与Meli+、黑五、Dia das Mães等大促活动 | 流量最大，但折扣要求高（通常要求≥20%） |<br />\n| 优惠券 | 发放定向优惠券（公开券/粉丝券） | 精准触达，成本可控 |<br />\n| 限时秒杀 | 报名站内秒杀活动 | 短时间内脉冲式出单 |<br />\n| 满减活动 | 满X雷亚尔减Y雷亚尔 | 提升客单价，带动整体消耗 |</p>",
          "orig": ""
        },
        {
          "title": "5.5.3 四步策略决策流程",
          "brief": "",
          "core": "<pre class=\"codehilite\"><code>库存入库\n    ↓\n第30天盘点 → 周转天数&lt;45天 → 继续正常销售\n    ↓ 周转天数≥45天\n第1步：阶梯降价（7~14天）\n    ↓ 销售回暖达到目标\n恢复正常运营\n    ↓ 销量无明显提升\n第2步：捆绑销售（7~14天）\n    ↓ 销售回暖达到目标\n恢复正常运营\n    ↓ 销量仍不达标\n第3步：活动清仓（7~14天）\n    ↓ 出清成功\n完结\n    ↓ 仍有大量库存\n第4步：本地批发\n    ↓\n终极清仓\n</code></pre><h2>时间窗口不可逆。在仓储费倍增的第61天到来之前，必须完成第一波（阶梯降价）清仓尝试。这是整个清仓策略的时间底线。</h2>",
          "warn": "",
          "ext": "",
          "orig": ""
        }
      ]

        {
          "title": "6.1.1 三种广告类型",
          "brief": "",
          "core": "<p><strong>关键词广告（Anúncios por Palavras-chave）</strong><br />\n关键词广告是 MercadoLibre 站内搜索广告，与亚马逊的Sponsored Products类似。当买家在搜索框中输入关键词时，广告产品会出现在搜索结果页的置顶位置和中间混排位置。计费方式为CPC（按点击付费），卖家仅为实际点击付费。<br />\n展示位置特征：<br />\n- 搜索结果页第1-3位为广告位，标注\"Anúncio\"标识<br />\n- 搜索结果页中间每隔20个自然位插入一个广告位<br />\n- 产品详情页\"相关产品\"区域也有广告位<br />\n<strong>展示广告（Anúncios por Exibição）</strong><br />\n展示广告基于买家的浏览行为和类目定向进行投放，出现在产品详情页侧边栏和站内推荐位。展示广告同样采用CPC计费，但CPC通常比关键词广告低30-50%。这类广告适合用于类目拦截和竞品流量截取。<br />\n<strong>品牌广告（Anúncios de Marca）</strong><br />\n品牌广告是 MercadoAds 的高阶广告形式，允许卖家在搜索结果页顶部展示品牌Logo、多款产品和自定义标语。品牌广告按CPM（千次展示）计费，适合品牌知名度建设。目前品牌广告仅向品牌注册卖家开放，且需要一定审核周期。</p>",

        {
          "title": "6.1.3 巴西与墨西哥CPC差异",
          "brief": "",
          "core": "<p>巴西站和墨西哥站虽然同属 MercadoLibre 平台，但广告竞争环境差异显著。根据大量卖家实际投放数据：<br />\n- <strong>巴西站平均CPC：R$3.0-R$8.0</strong>（约0.5-1.3美元），热门品类可达R$12以上<br />\n- <strong>墨西哥站平均CPC：MXN$5.0-MXN$15.0</strong>（约0.25-0.75美元）<br />\n巴西站CPC约为墨西哥站的2倍，主要原因有三：<br />\n1. <strong>巴西关税壁垒高</strong>——本地卖家占绝对主导，中国卖家少，竞争相对集中在本地卖家之间<br />\n2. <strong>巴西消费者购买力更强</strong>——客单价普遍高于墨西哥，广告ROI空间更大<br />\n3. <strong>巴西物流成本更高</strong>——卖家将物流成本计入售价，推高客单价和广告竞争出价<br />\n这意味着，在巴西站做广告，需要更高的客单价和毛利率来支撑广告投入。如果你的产品在巴西站售价低于R$50，广告投放几乎不可能盈利。</p>\n<hr />",

          "core": "<pre class=\"codehilite\"><code>Campanha（系列）          →  预算、出价策略、投放时间\n    └── Grupo（广告组）    →  产品列表、匹配方式、否定关键词\n            └── Palavra-chave（关键词） →  具体关键词及出价\n</code></pre>\n\n<p>每一层承担不同的管理职责：<br />\n- <strong>系列层</strong>：控制整体预算和投放日程。可设置每日预算上限和投放时间段。<br />\n- <strong>广告组层</strong>：管理产品投放和关键词匹配策略。一个广告组通常投放1-3个产品。<br />\n- <strong>关键词层</strong>：管理具体关键词及其出价。每个关键词独立设置出价。</p>",

        {
          "title": "6.2.2 按产品线划分系列",
          "brief": "",
          "core": "<p>不建议将所有产品塞进一个系列，而应按照产品线和投放目的划分：<br />\n<strong>系列一：爆款捍卫系列</strong><br />\n- 目的：保护已打造成的爆款，防止竞品抢占流量<br />\n- 产品：月销100+的成熟产品<br />\n- 预算：总广告预算的50-60%<br />\n- 策略：以精准匹配为主，ACOS目标控制在20%以内<br />\n- 出价：可接受更高出价，因为转化率稳定<br />\n<strong>系列二：新品测款系列</strong><br />\n- 目的：测试新品市场反应，收集关键词数据<br />\n- 产品：上架30天内新品<br />\n- 预算：总广告预算的20-25%<br />\n- 策略：自动广告为主，开启广泛+词组匹配<br />\n- 考核标准：前7天仅看点击率，第2周起看转化率<br />\n<strong>系列三：清仓系列</strong><br />\n- 目的：清理积压库存，回笼资金<br />\n- 产品：库存周转超过90天或即将下架的商品<br />\n- 预算：总广告预算的10%<br />\n- 策略：低出价自动广告，牺牲利润换销量<br />\n- ACOS容忍度：可接受80-100%，只要整体不亏</p>",

          "brief": "",
          "core": "<p>每个广告组的关键词数量直接影响曝光分配效率。根据MercadoLibre的广告算法特性：<br />\n- <strong>最佳范围：5-10个关键词/组</strong><br />\n- 超过10个关键词，低点击词会拉低组内整体质量分<br />\n- 少于5个关键词，数据样本不足，无法有效优化<br />\n实操建议：创建广告组时，将语义相近的关键词放在同一组。例如将\"capa de celular iphone 15\"和\"capa iphone 15\"放在一组，将\"capa de silicone iphone 15\"和\"capa de silicone iphone 15 pro\"放在不同组——因为材质词不同，买家意图有差异。</p>\n<hr />",

        {
          "title": "6.3.4 巴西市场的错拼问题",

          "core": "<p>巴西用户的拼写错误率在拉美电商平台中居首。实际投放数据显示，搜索词报告中约有15-30%的搜索词存在拼写错误。这是中国卖家容易忽略的流量来源。<br />\n<strong>常见错拼类型</strong>：<br />\n| 正确拼写 | 常见错拼 | 出现频率 |<br />\n|---------|---------|---------|<br />\n| celular | celula, celuar, celullar | 高 |<br />\n| capa de celular | capa de celula, cap de celular | 高 |<br />\n| fone de ouvido | fone de ouvido, fone duvido | 中 |<br />\n| carregador | caregador, carregado, carregdor | 高 |<br />\n| pelicula | película, pelicula de vidro | 中 |<br />\n<strong>应对策略</strong>：<br />\n1. <strong>广泛匹配中加否定词时，也要考虑错拼否定</strong>——例如你的产品是正品，需否定\"gratis\"\"barato\"及其错拼变体<br />\n2. <strong>精准匹配关键词时，主动添加高频错拼词</strong>——错拼词竞争低、CPC低，是性价比极高的流量来源<br />\n3. <strong>每周检查搜索词报告中的错拼词表现</strong>——错拼词转化率通常与正确拼写接近，但CPC低30-50%</p>",

      "title": "7.1 三大核心指标解读",
      "desc": "广告优化的前提是对核心指标有准确理解。MercadoLibre 广告后台提供的关键指标中，有三个指标必须每日关注：CTR、CVR 和 ACOS。这三个指标不是孤立的，它们共同揭示广告的健康状况和问题所",
      "topics": [
        {
          "title": "7.1.1 CTR（点击率）",
          "brief": "",
          "core": "<p>CTR = 点击量 ÷ 曝光量 × 100%<br />\nCTR反映的是广告对买家的吸引力。当你的广告展示在搜索结果页时，买家是否愿意点击它，取决于三个因素：<br />\n1. <strong>主图质量</strong>——是否清晰、是否与搜索结果页其他产品形成视觉差异<br />\n2. <strong>标题相关度</strong>——是否包含了买家正在搜索的关键词<br />\n3. <strong>价格竞争力</strong>——在搜索结果页中是否具有价格优势<br />\n4. <strong>评价数量和评分</strong>——是否有足够的评价支撑转化信心<br />\n<strong>行业基准参考</strong>：<br />\n- MercadoLibre 全品类平均CTR：0.8-1.2%<br />\n- 巴西站电子品类：0.5-0.8%<br />\n- 巴西站家居品类：1.0-1.5%<br />\n- 墨西哥站整体：1.0-1.8%<br />\n当CTR低于0.5%时，优先优化主图和标题，而不是调整出价。曝光已经获得，问题是买家看到了但不点击，这是创意层面的问题，不是出价问题。</p>",

        {
          "title": "7.1.2 CVR（转化率）",
          "brief": "",
          "core": "<p>CVR = 订单量 ÷ 点击量 × 100%<br />\nCVR反映的是产品详情页的说服力。买家点击了广告进入产品详情页，是否最终下单，取决于：<br />\n1. <strong>详情页质量</strong>——图片、描述、规格是否完整专业<br />\n2. <strong>评价数量与质量</strong>——是否有足够的好评消除购买顾虑<br />\n3. <strong>价格与运费</strong>——是否在合理范围内，是否有满减或免运<br />\n4. <strong>竞品对比</strong>——买进是否在对比后选择了其他卖家<br />\n<strong>行业基准参考</strong>：<br />\n- MercadoLibre 全品类平均CVR：4-7%<br />\n- 巴西站电子品类：3-5%<br />\n- 巴西站快速消费品：8-12%<br />\n- 墨西哥站整体：5-8%<br />\n当CVR低于3%时，不要急于否定关键词，先检查详情页是否存在问题。CVR问题通常是产品层面的问题，不是广告层面的问题。</p>",

        {
          "title": "7.1.4 三大指标联动诊断",
          "brief": "",
          "core": "<p>只看单一指标无法判断问题所在。将三个指标放在一起看，才能准确定位：<br />\n| 现象 | 曝光量 | CTR | CVR | ACOS | 根因 | 解决方案 |<br />\n|------|--------|-----|-----|------|------|---------|<br />\n| <strong>场景A</strong> | 高 | 低 | 正常 | 偏高 | 主图/标题不够吸引 | 优化主图和标题 |<br />\n| <strong>场景B</strong> | 正常 | 正常 | 低 | 高 | 详情页/评价不足 | 优化详情页、催评 |<br />\n| <strong>场景C</strong> | 高 | 高 | 低 | 极高 | 关键词不精准 | 缩小匹配范围、加否定词 |<br />\n| <strong>场景D</strong> | 正常 | 高 | 高 | 低 | 表现健康 | 维持或适度加预算 |<br />\n| <strong>场景E</strong> | 正常 | 低 | 低 | 高 | 整体竞争力不足 | 检查价格、评价、Listing |<br />\n<strong>诊断逻辑</strong>：从上往下看。先看曝光是否充足，再看点击是否正常，再看转化是否达标，逐层排查。</p>\n<hr />",

        {
          "title": "7.2.1 ACOS盈亏平衡点公式",
          "brief": "其中毛利率的计算方式：",
          "core": "<p>ACOS盈亏平衡点的计算公式：</p><p>其中毛利率的计算方式：</p><p><strong>举例说明</strong>：<br />\n一款蓝牙耳机在巴西站的售价为R$150，各项成本如下：<br />\n- 产品成本：R$35（含头程运费）<br />\n- 物流成本（含尾程）：R$25<br />\n- 平台佣金（17% + 每单固定费）：R$28<br />\n- 退款退货损耗：5%<br />\n毛利率 = (150 - 35 - 25 - 28) ÷ 150 × 100% = 41.3%<br />\nACOS盈亏平衡点 = 41.3% - 5% = 36.3%<br />\n这意味着，这款耳机的广告ACOS必须控制在36.3%以内，广告才能做到不亏钱。</p>",

        {
          "title": "7.2.2 不同阶段的ACOS目标",
          "brief": "",
          "core": "<p>实际投放中，并非所有阶段都需要ACOS低于盈亏平衡点。广告有战术性亏损的阶段：<br />\n| 产品阶段 | 可接受ACOS | 核心目标 | 盈利要求 |<br />\n|---------|-----------|---------|---------|<br />\n| <strong>新品期（0-30天）</strong> | 60-80% | 积累排名和评价 | 不要求盈利 |<br />\n| <strong>成长期（31-90天）</strong> | 35-45% | 扩大规模抢占排名 | 接近平衡 |<br />\n| <strong>成熟期（91天+）</strong> | ≤25% | 利润最大化 | 必须盈利 |</p><ul>\n<li>如果产品毛利率较高（＞50%），ACOS容忍度可以更高，因为广告亏损部分可以通过自然转化弥补</li>\n<li>如果产品毛利率较低（＜30%），ACOS必须严格控制，否则广告越大亏越多</li>\n<li>新品期允许亏损是战略性投入，但必须有明确的时间节点——超过90天仍然无法盈利的产品，应考虑淘汰</li>\n</ul>",
